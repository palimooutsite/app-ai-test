version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: accounting
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/accounting?schema=public
      JWT_SECRET: super-secret-jwt
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: http://backend:3000/api/v1
    ports:
      - '3001:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
